<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 회원가입</title>
    <!-- Font Awesome Icons for beautiful input decorations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <main class="card">
            <!-- Header Section -->
            <header class="header">
                <div class="logo-area">
                    <i class="fa-solid fa-graduation-cap logo-icon"></i>
                    <h1 class="logo-text">영진전문대<span>학교</span></h1>
                </div>
                <p class="title">통합 회원가입</p>
            </header>

            <!-- Signup Form -->
            <form id="signupForm" novalidate>
                
                <!-- 아이디 필드 -->
                <div class="form-group">
                    <label for="userId" class="form-label">아이디</label>
                    <div class="input-wrapper">
                        <input type="text" id="userId" class="form-input" placeholder="5~20자의 영문 소문자, 숫자" autocomplete="username" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div id="userIdError" class="validation-message"></div>
                </div>

                <!-- 비밀번호 필드 -->
                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="8~20자 영문, 숫자, 특수문자 조합" autocomplete="new-password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <div id="passwordError" class="validation-message"></div>
                </div>

                <!-- 비밀번호 확인 필드 -->
                <div class="form-group">
                    <label for="passwordConfirm" class="form-label">비밀번호 확인</label>
                    <div class="input-wrapper">
                        <input type="password" id="passwordConfirm" class="form-input" placeholder="비밀번호 재입력" autocomplete="new-password" required>
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div id="passwordConfirmError" class="validation-message"></div>
                </div>

                <!-- 이메일 필드 -->
                <div class="form-group">
                    <label for="email" class="form-label">이메일</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-input" placeholder="example@yju.ac.kr" autocomplete="email" required>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div id="emailError" class="validation-message"></div>
                </div>

                <!-- 전화번호 필드 -->
                <div class="form-group">
                    <label for="phone" class="form-label">전화번호</label>
                    <div class="input-wrapper">
                        <input type="tel" id="phone" class="form-input" placeholder="010-0000-0000" autocomplete="tel" required>
                        <i class="fa-solid fa-phone"></i>
                    </div>
                    <div id="phoneError" class="validation-message"></div>
                </div>

                <!-- 회원가입 제출 버튼 -->
                <button type="submit" class="submit-btn">
                    <span>가입하기</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <footer class="footer-text">
                이미 계정이 있으신가요? <a href="#">로그인</a>
            </footer>
        </main>
    </div>

    <!-- 가입 성공 모달 (Modal Overlay & Box) -->
    <div id="successModal" class="modal-overlay">
        <section class="modal" role="dialog" aria-labelledby="modalTitle" aria-describedby="modalDesc">
            <div class="modal-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2 id="modalTitle" class="modal-title">회원가입 완료</h2>
            <p id="modalDesc" class="modal-desc">
                영진전문대학교 통합 회원가입이 완료되었습니다.<br>
                환영합니다!
            </p>
            <button id="modalConfirmBtn" class="modal-btn">확인</button>
        </section>
    </div>

    <!-- Custom Logic Script -->
    <script src="script.js"></script>
</body>
</html>
