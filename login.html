<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 로그인</title>
    <!-- Font Awesome Icons for beautiful input decorations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <main class="card">
            <!-- Header Section -->
            <header class="header">
                <div class="logo-area">
                    <i class="fa-solid fa-graduation-cap logo-icon"></i>
                    <h1 class="logo-text">영진전문대<span>학교</span></h1>
                </div>
                <p class="title">통합 로그인</p>
            </header>

            <!-- Login Form -->
            <form id="loginForm" novalidate>
                
                <!-- 아이디 필드 -->
                <div class="form-group">
                    <label for="userId" class="form-label">아이디</label>
                    <div class="input-wrapper">
                        <input type="text" id="userId" class="form-input" placeholder="아이디를 입력해 주세요." autocomplete="username" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div id="userIdError" class="validation-message"></div>
                </div>

                <!-- 비밀번호 필드 -->
                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력해 주세요." autocomplete="current-password" required>
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <div id="passwordError" class="validation-message"></div>
                </div>

                <!-- 로그인 제출 버튼 -->
                <button type="submit" class="submit-btn">
                    <span>로그인</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <footer class="footer-text">
                아직 계정이 없으신가요? <a href="index.html">회원가입</a>
            </footer>
        </main>
    </div>

    <!-- 로그인 성공 모달 (Modal Overlay & Box) -->
    <div id="successModal" class="modal-overlay">
        <section class="modal" role="dialog" aria-labelledby="modalTitle" aria-describedby="modalDesc">
            <div class="modal-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2 id="modalTitle" class="modal-title">로그인 완료</h2>
            <p id="modalDesc" class="modal-desc">
                로그인이 성공적으로 완료되었습니다.<br>
                환영합니다!
            </p>
            <button id="modalConfirmBtn" class="modal-btn">확인</button>
        </section>
    </div>

    <!-- Local Supabase JS Client library -->
    <script src="supabase.js"></script>
    <!-- Login Logic Script -->
    <script src="login.js?v=2"></script>
</body>
</html>
