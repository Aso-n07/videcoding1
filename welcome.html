<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영진전문대학교 - 가입 완료</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-card {
            text-align: center;
            padding: 3rem 2.5rem;
        }
        .welcome-icon-box {
            width: 80px;
            height: 80px;
            background-color: rgba(0, 51, 102, 0.05);
            color: var(--yju-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
            animation: pulse-yju 2s infinite ease-in-out;
        }
        .welcome-title {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--yju-primary);
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }
        .welcome-text {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }
        .welcome-text span {
            color: var(--yju-secondary);
            font-weight: 600;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn-secondary {
            background-color: transparent;
            border: 1.5px solid var(--yju-primary);
            color: var(--yju-primary);
            box-shadow: none;
            text-decoration: none;
        }
        .btn-secondary:hover {
            background-color: rgba(0, 51, 102, 0.05);
            box-shadow: none;
            color: var(--yju-primary-hover);
            border-color: var(--yju-primary-hover);
        }
        .btn-primary {
            text-decoration: none;
        }
        
        @keyframes pulse-yju {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 51, 102, 0.2);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 12px rgba(0, 51, 102, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(0, 51, 102, 0);
            }
        }
        
        @media (max-width: 480px) {
            .welcome-card {
                padding: 2rem 1.5rem;
            }
            .welcome-title {
                font-size: 1.4rem;
            }
            .btn-group {
                flex-direction: column;
                gap: 0.75rem;
            }
            .btn-group .submit-btn {
                width: 100% !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <main class="card welcome-card">
            <div class="welcome-icon-box">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <h1 class="welcome-title">가입을 환영합니다!</h1>
            <p class="welcome-text">
                영진전문대학교 통합 회원가입이<br>
                성공적으로 완료되었습니다.<br>
                이제 다양한 대학 학사 서비스를 바로 이용해 보세요.
            </p>
            <div class="btn-group">
                <a href="index.html" class="submit-btn btn-secondary" style="margin-top:0; width: 140px;">
                    <i class="fa-solid fa-house" style="position:static; margin-right: 0.4rem; color:inherit;"></i>홈으로
                </a>
                <a href="index.html" class="submit-btn btn-primary" style="margin-top:0; width: 140px;">
                    로그인하기<i class="fa-solid fa-chevron-right" style="position:static; margin-left: 0.4rem; color:inherit;"></i>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
